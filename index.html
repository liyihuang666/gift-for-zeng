<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="翔安区新圩第一中心幼儿园 - 闽南红砖古厝里的童趣园，善善曦曦欢迎您">
  <title>翔安区新圩第一中心幼儿园 · 欢迎您</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #fff8f0;
      font-family: -apple-system, "PingFang SC", "Noto Serif SC", "Helvetica Neue", "SF Pro Text", system-ui, serif;
      color: #2b241c;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* 闽南红砖主色调 */
    :root {
      --brick-red: #bc5a3c;
      --brick-deep: #9c3e24;
      --golden: #d9a13b;
      --clay-bg: #f7ede2;
      --paper: #ffffff;
      --text-dark: #2c241a;
    }

    /* 红砖墙背景纹理 */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        repeating-linear-gradient(45deg, rgba(188, 90, 60, 0.03) 0px, rgba(188, 90, 60, 0.03) 2px, transparent 2px, transparent 12px),
        repeating-linear-gradient(135deg, rgba(188, 90, 60, 0.02) 0px, rgba(188, 90, 60, 0.02) 1px, transparent 1px, transparent 10px);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 48px 32px 80px;
      position: relative;
      z-index: 2;
    }

    /* 燕尾脊装饰线条 (顶部) */
    .swallow-tail {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 28px;
    }
    .swallow-tail span {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, var(--brick-red), var(--golden));
      border-radius: 3px;
    }
    .swallow-tail span:first-child,
    .swallow-tail span:last-child {
      width: 72px;
    }

    /* ========= 吉祥物区域（趣味开场，表情相对） ========= */
    .mascots-header {
      background: rgba(247, 237, 226, 0.6);
      backdrop-filter: blur(4px);
      border-radius: 80px;
      padding: 24px 32px;
      margin-bottom: 32px;
      border: 1px solid rgba(188, 90, 60, 0.25);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.04);
    }

    .mascots-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .mascot-card {
      flex: 1;
      min-width: 200px;
      text-align: center;
      transition: transform 0.3s ease;
      position: relative;
      cursor: default;
    }
    .mascot-card:hover {
      transform: translateY(-8px);
    }

    .mascot-avatar {
      display: inline-block;
      background: rgba(255, 255, 245, 0.9);
      border-radius: 48px;
      padding: 18px;
      box-shadow: 0 12px 20px rgba(0, 0, 0, 0.08);
      border: 2px solid #f0dfce;
      transition: all 0.25s;
      position: relative;
      animation: float 3s ease-in-out infinite;
    }
    /* 两个吉祥物不同浮动相位，更生动 */
    .mascot-card:first-child .mascot-avatar {
      animation-delay: 0s;
    }
    .mascot-card:last-child .mascot-avatar {
      animation-delay: 0.6s;
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    .mascot-card:hover .mascot-avatar {
      background: white;
      border-color: var(--golden);
      box-shadow: 0 18px 28px rgba(0, 0, 0, 0.12);
      animation-play-state: paused;
    }

    .mascot-avatar img {
      width: 130px;
      height: 130px;
      object-fit: contain;
      display: block;
    }

    /* 名字标签 */
    .mascot-name {
      margin-top: 16px;
      font-size: 22px;
      font-weight: 600;
      color: var(--brick-deep);
      letter-spacing: 2px;
      background: linear-gradient(135deg, #bc5a3c, #d97a54);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    /* 趣味对话气泡（悬浮时出现） */
    .mascot-card .bubble {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%) scale(0.8);
      background: #fff5e8;
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 15px;
      font-weight: 500;
      color: #b45a3a;
      white-space: nowrap;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
      border: 1px solid #f5d5b5;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s ease;
      z-index: 10;
      font-family: "PingFang SC", "Noto Serif SC", serif;
      backdrop-filter: blur(4px);
    }
    .mascot-card:hover .bubble {
      opacity: 1;
      transform: translateX(-50%) scale(1);
      top: -32px;
    }
    /* 气泡小尾巴 */
    .mascot-card .bubble::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 12px;
      background: #fff5e8;
      border-right: 1px solid #f5d5b5;
      border-bottom: 1px solid #f5d5b5;
      transform: translateX(-50%) rotate(45deg);
    }

    /* 中间红砖爱心装饰 */
    .mascots-heart {
      font-size: 48px;
      color: var(--golden);
      background: rgba(217, 161, 59, 0.15);
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
      border: 1px dashed var(--brick-red);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); opacity: 0.7; }
    }

    /* 头部其他内容 */
    .hero {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo-wrapper {
      display: inline-flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .logo {
      width: 140px;
      height: 140px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.05));
    }
    .logo .fallback-icon {
      font-size: 86px;
      color: var(--brick-red);
    }

    h1 {
      font-size: 48px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--text-dark);
      margin-bottom: 24px;
      line-height: 1.2;
    }

    .philosophy-statement {
      font-size: 26px;
      font-weight: 500;
      color: var(--brick-deep);
      display: inline-block;
      padding: 8px 32px;
      background: rgba(217, 161, 59, 0.1);
      border-radius: 60px;
      backdrop-filter: blur(2px);
      letter-spacing: 2px;
      border: 1px solid rgba(188, 90, 60, 0.2);
    }

    /* 视频卡片 */
    .media-section {
      margin-bottom: 72px;
    }
    .video-card {
      background: var(--paper);
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 20px 32px -12px rgba(0, 0, 0, 0.08);
      border: 1px solid #f0dfce;
    }
    .video-container {
      position: relative;
      width: 100%;
      background: #e2d2be;
      cursor: pointer;
    }
    .video-container video {
      width: 100%;
      height: auto;
      display: block;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }
    .play-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      border-radius: 32px;
    }
    .play-overlay:hover {
      background: rgba(0, 0, 0, 0.18);
    }
    .play-btn {
      width: 84px;
      height: 84px;
      background: rgba(255, 255, 245, 0.96);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
      transition: transform 0.2s;
      cursor: pointer;
    }
    .play-btn::after {
      content: "▶";
      font-size: 36px;
      color: var(--brick-red);
      margin-left: 6px;
    }
    .play-btn:hover {
      transform: scale(1.06);
    }
    .loading-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 48px;
      height: 48px;
      border: 4px solid rgba(188, 90, 60, 0.2);
      border-top: 4px solid var(--brick-red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      z-index: 3;
      display: none;
    }
    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* 三卡片 (宗旨、目标、课程) */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
      margin: 56px 0 48px;
    }
    .card {
      background: var(--paper);
      border-radius: 28px;
      padding: 32px 24px;
      transition: all 0.3s ease;
      border: 1px solid #e8d6c4;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.02);
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: repeating-linear-gradient(45deg, rgba(188, 90, 60, 0.02) 0px, rgba(188, 90, 60, 0.02) 1px, transparent 1px, transparent 8px);
      pointer-events: none;
    }
    .card:hover {
      transform: translateY(-6px);
      border-color: #dabb9a;
      box-shadow: 0 24px 36px -16px rgba(100, 60, 30, 0.15);
    }
    .card::before {
      content: "❦";
      font-size: 32px;
      color: rgba(188, 90, 60, 0.1);
      position: absolute;
      top: 12px;
      right: 16px;
      font-family: serif;
      pointer-events: none;
    }
    .card-icon {
      font-size: 52px;
      margin-bottom: 20px;
      display: inline-block;
      background: rgba(188, 90, 60, 0.1);
      width: 76px;
      height: 76px;
      line-height: 76px;
      text-align: center;
      border-radius: 24px;
      color: var(--brick-red);
    }
    .card h3 {
      font-size: 26px;
      font-weight: 600;
      color: var(--brick-deep);
      margin-bottom: 14px;
    }
    .card p {
      font-size: 18px;
      line-height: 1.5;
      color: var(--text-dark);
      font-weight: 500;
    }
    .card-footer-line {
      margin-top: 22px;
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, var(--golden), transparent);
      border-radius: 2px;
    }

    /* 底部装饰 */
    .minnan-footer-decoration {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 32px 0 24px;
    }
    .minnan-footer-decoration span {
      font-size: 22px;
      color: var(--golden);
      opacity: 0.6;
    }
    .footer {
      text-align: center;
      font-size: 14px;
      color: #b29074;
      border-top: 1px solid #eedbcb;
      padding-top: 28px;
    }

    /* 响应式 */
    @media (max-width: 880px) {
      .container {
        padding: 32px 24px 64px;
      }
      h1 {
        font-size: 38px;
      }
      .philosophy-statement {
        font-size: 22px;
      }
      .mascot-avatar img {
        width: 100px;
        height: 100px;
      }
      .mascots-heart {
        width: 60px;
        height: 60px;
        font-size: 36px;
      }
      .cards-grid {
        gap: 24px;
      }
      .card h3 {
        font-size: 24px;
      }
    }
    @media (max-width: 700px) {
      .mascots-row {
        flex-direction: column;
      }
      .mascots-heart {
        transform: rotate(90deg);
        margin: 8px 0;
      }
      .mascot-card {
        width: 100%;
      }
      .mascot-avatar img {
        width: 110px;
        height: 110px;
      }
      .cards-grid {
        grid-template-columns: 1fr;
      }
      h1 {
        font-size: 30px;
      }
      .logo {
        width: 110px;
        height: 110px;
      }
    }
    @media (max-width: 500px) {
      .play-btn {
        width: 64px;
        height: 64px;
      }
      .play-btn::after {
        font-size: 28px;
      }
      .card {
        padding: 24px 20px;
      }
    }

    .fade-in {
      animation: fadeUp 0.6s ease-out;
    }
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
<div class="container fade-in">
  <!-- 燕尾脊线条 -->
  <div class="swallow-tail">
    <span></span><span></span><span></span>
  </div>

  <!-- 吉祥物善善 & 曦曦 趣味开场 (表情相对，互动气泡) -->
  <div class="mascots-header">
    <div class="mascots-row">
      <!-- 善善 (左边) logo1.png -->
      <div class="mascot-card">
        <div class="mascot-avatar">
          <img src="logo1.png" alt="吉祥物善善" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'45\' fill=\'%23BC5A3C\'/%3E%3Ctext x=\'50\' y=\'68\' font-size=\'40\' text-anchor=\'middle\' fill=\'white\'%3E🐲%3C/text%3E%3C/svg%3E';">
        </div>
        <div class="mascot-name">善善</div>
        <div class="bubble">🌟 小朋友你好呀！</div>
      </div>

      <!-- 中间红砖爱心装饰 -->
      <div class="mascots-heart">
        <span>🏮</span>
      </div>

      <!-- 曦曦 (右边) logo2.png -->
      <div class="mascot-card">
        <div class="mascot-avatar">
          <img src="logo2.png" alt="吉祥物曦曦" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'45\' fill=\'%23D9A13B\'/%3E%3Ctext x=\'50\' y=\'68\' font-size=\'40\' text-anchor=\'middle\' fill=\'white\'%3E🌸%3C/text%3E%3C/svg%3E';">
        </div>
        <div class="mascot-name">曦曦</div>
        <div class="bubble">💖 快来一起玩耍吧！</div>
      </div>
    </div>
  </div>

  <!-- 幼儿园徽标与标题 -->
  <div class="hero">
    <div class="logo-wrapper">
      <div class="logo">
        <img src="image.png" alt="翔安区新圩第一中心幼儿园" onerror="this.onerror=null; this.parentElement.innerHTML='<span class=\'fallback-icon\'>🏮</span>';">
      </div>
    </div>
    <h1>翔安区新圩第一中心幼儿园欢迎您</h1>
    <div class="philosophy-statement">让教育充满情怀</div>
  </div>

  <!-- 视频区域 (懒加载优化) -->
  <div class="media-section">
    <div class="video-card">
      <div class="video-container" id="videoContainer">
        <video 
          id="kindergartenVideo"
          playsinline
          preload="none"
          poster="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1280 720'%3E%3Crect width='1280' height='720' fill='%23E7D8C5'/%3E%3Ccircle cx='640' cy='360' r='80' fill='%23BC5A3C' opacity='0.2'/%3E%3Cpolygon points='620,325 670,360 620,395' fill='%23BC5A3C' opacity='0.5'/%3E%3Ctext x='640' y='500' font-size='28' font-family='serif' text-anchor='middle' fill='%23A56B3A'%3E🏮 新圩一幼 欢喜相招 🏮%3C/text%3E%3C/svg%3E"
          style="width:100%; display:block;"
        ></video>
        <div class="play-overlay" id="playOverlay">
          <div class="play-btn" id="playButton"></div>
        </div>
        <div class="loading-indicator" id="loadingSpinner"></div>
      </div>
    </div>
  </div>

  <!-- 三卡片：宗旨、培养目标、园本课程 (文案严格依照) -->
  <div class="cards-grid">
    <div class="card">
      <div class="card-icon">🏮</div>
      <h3>办园宗旨</h3>
      <p>彼此映照 欣喜成长</p>
      <div class="card-footer-line"></div>
    </div>
    <div class="card">
      <div class="card-icon">🐉</div>
      <h3>培养目标</h3>
      <p>知乡 爱乡 身心和谐发展的新圩一幼娃</p>
      <div class="card-footer-line"></div>
    </div>
    <div class="card">
      <div class="card-icon">📜</div>
      <h3>园本课程</h3>
      <p>新曦乐生活 善渊弘文化</p>
      <div class="card-footer-line"></div>
    </div>
  </div>

  <!-- 闽南装饰及版权 -->
  <div class="minnan-footer-decoration">
    <span>🧱</span> <span>🏮</span> <span>🐉</span> <span>🍃</span> <span>🎋</span>
  </div>
  <div class="footer">
    🌾 翔安区新圩第一中心幼儿园 · 红砖古厝里的童年时光 · 善善曦曦伴成长 🌾
  </div>
</div>

<script>
  (function() {
    // 视频懒加载优化 (微信/移动端点击加载)
    const video = document.getElementById('kindergartenVideo');
    const playOverlay = document.getElementById('playOverlay');
    const playBtn = document.getElementById('playButton');
    const spinner = document.getElementById('loadingSpinner');
    const VIDEO_SRC = 'video.mp4';
    let isLoading = false;
    let loadAttempted = false;
    let videoReady = false;

    function hideOverlayAndLoading() {
      if (playOverlay) playOverlay.style.display = 'none';
      if (spinner) spinner.style.display = 'none';
    }

    function showErrorHint() {
      if (spinner) spinner.style.display = 'none';
      isLoading = false;
      if (playBtn) {
        playBtn.style.opacity = '0.6';
        setTimeout(() => { if(playBtn) playBtn.style.opacity = '1'; }, 1000);
      }
    }

    function loadAndPlay() {
      if (isLoading) return;
      if (videoReady && video.readyState >= 2) {
        video.play().then(() => {
          hideOverlayAndLoading();
        }).catch(e => {
          console.warn('播放失败', e);
          hideOverlayAndLoading();
        });
        return;
      }
      if (!loadAttempted) {
        isLoading = true;
        loadAttempted = true;
        if (spinner) spinner.style.display = 'block';
        video.src = VIDEO_SRC;
        video.preload = 'auto';
        video.load();

        const onCanPlay = () => {
          video.removeEventListener('canplaythrough', onCanPlay);
          video.removeEventListener('loadeddata', onCanPlay);
          if (isLoading) {
            videoReady = true;
            video.play().then(() => {
              hideOverlayAndLoading();
              isLoading = false;
            }).catch(err => {
              console.warn('play error', err);
              isLoading = false;
              hideOverlayAndLoading();
            });
          }
        };
        const onError = () => {
          video.removeEventListener('canplaythrough', onCanPlay);
          video.removeEventListener('error', onError);
          isLoading = false;
          loadAttempted = false;
          showErrorHint();
        };
        video.addEventListener('canplaythrough', onCanPlay, { once: true });
        video.addEventListener('loadeddata', onCanPlay, { once: true });
        video.addEventListener('error', onError, { once: true });
        setTimeout(() => {
          if (isLoading) onError();
        }, 10000);
      } else {
        if (video.readyState === 0 || video.networkState === 3) {
          loadAttempted = false;
          video.src = '';
          video.load();
          setTimeout(() => {
            video.src = VIDEO_SRC;
            loadAndPlay();
          }, 50);
        } else {
          video.play().then(() => {
            hideOverlayAndLoading();
            videoReady = true;
          }).catch(() => {
            if (playOverlay) playOverlay.style.display = 'flex';
          });
        }
      }
    }

    if (playBtn) {
      playBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        loadAndPlay();
      });
    }
    if (playOverlay) {
      playOverlay.addEventListener('click', (e) => {
        if (e.target === playBtn || (playBtn && playBtn.contains(e.target))) return;
        loadAndPlay();
      });
    }
    video.addEventListener('play', () => {
      if (playOverlay) playOverlay.style.display = 'none';
      if (spinner) spinner.style.display = 'none';
      isLoading = false;
      videoReady = true;
    });
    // 清除预加载
    const sources = video.querySelectorAll('source');
    sources.forEach(s => s.remove());
    if (!video.getAttribute('src')) {
      video.removeAttribute('src');
      video.load();
    }
    video.preload = 'none';
  })();
</script>
</body>
